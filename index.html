<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JB WNDRS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Libre+Baskerville:ital@0;1&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #1c1712;
      --bark:      #3b2f1e;
      --clay:      #8b5e3c;
      --sand:      #c9a87c;
      --parchment: #f0e8d8;
      --cream:     #faf6ef;
      --moss:      #4a5a3a;
      --sage:      #7a8f6a;
      --sky:       #6b8fa8;
      --accent:    #c05c2e;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Libre Baskerville', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 3rem;
      background: transparent;
      transition: background 0.4s ease, backdrop-filter 0.4s ease;
    }
    nav.scrolled {
      background: rgba(28, 23, 18, 0.88);
      backdrop-filter: blur(10px);
    }
    .nav-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      color: var(--parchment);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--parchment);
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 3rem 5rem;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 30%, rgba(107,143,168,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 120% 80% at 50% 110%, rgba(74,90,58,0.55) 0%, transparent 55%),
        linear-gradient(170deg,
          #2c3e2d 0%,
          #3d5440 18%,
          #5a6b42 32%,
          #7a8f6a 44%,
          #8b9e7a 50%,
          #c9a87c 62%,
          #d4b88a 70%,
          #b8956a 78%,
          #8b5e3c 88%,
          #3b2f1e 100%
        );
      z-index: 0;
    }

    .hero-mountains {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 1;
    }

    .hero-sun {
      position: absolute;
      top: 18%; right: 22%;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,210,120,0.7) 0%, rgba(240,160,60,0.35) 40%, transparent 70%);
      z-index: 1;
      animation: pulse-sun 6s ease-in-out infinite;
    }
    @keyframes pulse-sun {
      0%,100% { transform: scale(1); opacity: 0.85; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 680px;
    }

    .hero-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sand);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fade-up 0.8s 0.2s forwards;
    }

    .hero-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: clamp(4rem, 10vw, 8rem);
      line-height: 0.92;
      color: var(--parchment);
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fade-up 0.9s 0.4s forwards;
    }
    .hero-title em {
      font-style: italic;
      color: var(--sand);
    }

    .hero-tagline {
      font-size: 1.05rem;
      line-height: 1.7;
      color: rgba(240, 232, 216, 0.82);
      max-width: 420px;
      opacity: 0;
      animation: fade-up 0.9s 0.6s forwards;
    }

    .hero-scroll {
      position: absolute;
      bottom: 2.5rem;
      right: 3rem;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fade-up 0.9s 1s forwards;
    }
    .hero-scroll span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sand);
      writing-mode: vertical-rl;
    }
    .scroll-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, var(--sand), transparent);
      animation: scroll-pulse 2s ease-in-out infinite;
    }
    @keyframes scroll-pulse {
      0%,100% { opacity: 0.4; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.1); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DIVIDER RULE ── */
    .rule {
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--sand), transparent);
      opacity: 0.4;
    }
