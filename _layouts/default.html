<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% if page.title %}{{ page.title }} | {% endif %}JB Wanders</title>

  <style>
    :root {
      --bg: #f7f3ed;
      --paper: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --accent: #2f6f73;
      --border: #e5e0d8;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .site-shell {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .site-header {
      margin-bottom: 32px;
    }

    .site-header a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    main {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    img {
      max-width: 100%;
      border-radius: 16px;
      height: auto;
    }

    a {
      color: var(--accent);
    }

    .camino-stage {
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.85rem;
    }

    .camino-meta {
      color: var(--muted);
      margin-top: -8px;
    }

    figcaption {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      .site-shell {
        width: min(100% - 24px, 920px);
        padding-top: 20px;
      }

      main {
        padding: 18px;
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="site-shell">
    <header class="site-header">
      <a href="/">JB Wanders</a>
    </header>

    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
