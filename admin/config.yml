backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "camino_entries"
    label: "Camino Entries"
    folder: "_camino_entries"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Stage Number"
        name: "stage_number"
        widget: "number"
        value_type: "int"
        required: false

      - label: "Start Location"
        name: "start_location"
        widget: "string"
        required: false

      - label: "End Location"
        name: "end_location"
        widget: "string"
        required: false

      - label: "Latitude"
        name: "latitude"
        widget: "number"
        value_type: "float"
        required: false

      - label: "Longitude"
        name: "longitude"
        widget: "number"
        value_type: "float"
        required: false

      - label: "Distance in Miles"
        name: "distance_miles"
        widget: "number"
        value_type: "float"
        required: false

      - label: "Distance in KM"
        name: "km_walked"
        widget: "number"
        value_type: "float"
        required: false

      - label: "Elevation Gain (meters)"
        name: "elevation_gain"
        widget: "number"
        value_type: "int"
        required: false

      - label: "Weather"
        name: "weather"
        widget: "string"
        hint: "e.g. Sunny, Cool and cloudy, Light rain"
        required: false

      - label: "Content Block 1"
        name: "content_block_1"
        widget: "object"
        required: false
        fields:
          - { label: "Narrative", name: "narrative", widget: "markdown", required: false }
          - { label: "Photo", name: "photo", widget: "image", required: false }
          - { label: "Photo Caption", name: "photo_caption", widget: "string", required: false }
          - { label: "Vimeo ID", name: "vimeo_id", widget: "string", required: false }
