backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "camino_entries"
    label: "Camino Entries"
    folder: "_camino_entries"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-stage-{{stage_number}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

        - label: "Stage Number"
        name: "stage_number"
        widget: "number"
        value_type: "int"
        required: false

      - label: "Start Location"
        name: "start_location"
        widget: "string"
        required: false

      - label: "End Location"
        name: "end_location"
        widget: "string"
        required: false

      - label: "Latitude"
        name: "latitude"
        widget: "number"
        value_type: "float"
        required: false

      - label: "Longitude"
        name: "longitude"
        widget: "number"
        value_type: "float"
        required: false

      - label: "Distance in Miles"
        name: "distance_miles"
        widget: "number"
        value_type: "float"
        required: false

      - label: "Featured Image"
        name: "featured_image"
        widget: "image"
        required: false

      - label: "Image Caption"
        name: "image_caption"
        widget: "string"
        required: false

      - label: "Short Excerpt"
        name: "excerpt"
        widget: "text"
        required: false

      - label: "Narrative"
        name: "body"
        widget: "markdown"

      - label: "Additional Media 1 - Photo"
        name: "media_1_image"
        widget: "image"
        required: false

      - label: "Additional Media 1 - Photo Caption"
        name: "media_1_image_caption"
        widget: "string"
        required: false

      - label: "Additional Media 1 - Vimeo ID"
        name: "media_1_vimeo_id"
        widget: "string"
        required: false

      - label: "Additional Media 1 - Vimeo Caption"
        name: "media_1_vimeo_caption"
        widget: "string"
        required: false

      - label: "Additional Media 2 - Photo"
        name: "media_2_image"
        widget: "image"
        required: false

      - label: "Additional Media 2 - Photo Caption"
        name: "media_2_image_caption"
        widget: "string"
        required: false

      - label: "Additional Media 2 - Vimeo ID"
        name: "media_2_vimeo_id"
        widget: "string"
        required: false

      - label: "Additional Media 2 - Vimeo Caption"
        name: "media_2_vimeo_caption"
        widget: "string"
        required: false

      - label: "Additional Media 3 - Photo"
        name: "media_3_image"
        widget: "image"
        required: false

      - label: "Additional Media 3 - Photo Caption"
        name: "media_3_image_caption"
        widget: "string"
        required: false

      - label: "Additional Media 3 - Vimeo ID"
        name: "media_3_vimeo_id"
        widget: "string"
        required: false

      - label: "Additional Media 3 - Vimeo Caption"
        name: "media_3_vimeo_caption"
        widget: "string"
        required: false

      - label: "Additional Media 4 - Photo"
        name: "media_4_image"
        widget: "image"
        required: false

      - label: "Additional Media 4 - Photo Caption"
        name: "media_4_image_caption"
        widget: "string"
        required: false

      - label: "Additional Media 4 - Vimeo ID"
        name: "media_4_vimeo_id"
        widget: "string"
        required: false

      - label: "Additional Media 4 - Vimeo Caption"
        name: "media_4_vimeo_caption"
        widget: "string"
        required: false

      - label: "Additional Media 5 - Photo"
        name: "media_5_image"
        widget: "image"
        required: false

      - label: "Additional Media 5 - Photo Caption"
        name: "media_5_image_caption"
        widget: "string"
        required: false

      - label: "Additional Media 5 - Vimeo ID"
        name: "media_5_vimeo_id"
        widget: "string"
        required: false

      - label: "Additional Media 5 - Vimeo Caption"
        name: "media_5_vimeo_caption"
        widget: "string"
        required: false

  - name: "wanders"
    label: "JB Wanders"
    folder: "content/wanders"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Featured Image Caption", name: "featured_image_caption", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "wonders"
    label: "JB Wonders"
    folder: "content/wonders"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Featured Image Caption", name: "featured_image_caption", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "test"
    label: "Test Pages"
    files:
      - file: "content/test-page.md"
        label: "Test Page"
        name: "test_page"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Date", name: "date", widget: "datetime" }
          - { label: "Description", name: "description", widget: "string", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
